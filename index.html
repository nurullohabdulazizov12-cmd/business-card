<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nurillokh Abdulazizov | Digital Card</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Cinzel:wght@600&display=swap');

        :root {
            --dark: #0f172a;
            --card-bg: #1e293b;
            --gold: #c5a059;
            --white: #f8fafc;
        }

        body {
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: var(--white);
        }

        .card {
            width: 350px;
            background: var(--card-bg);
            border-radius: 30px;
            padding: 40px 25px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            border: 1px solid rgba(197, 160, 89, 0.2);
            position: relative;
        }

        .avatar {
            width: 80px;
            height: 80px;
            background: var(--gold);
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Cinzel', serif;
            font-size: 30px;
            color: var(--dark);
            font-weight: bold;
        }

        h1 { margin: 10px 0 5px; font-size: 20px; }
        .dept { color: var(--gold); font-size: 12px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        .cab { font-size: 11px; opacity: 0.7; margin-bottom: 20px; }

        .links { display: flex; flex-direction: column; gap: 10px; margin-bottom: 25px; }
        
        .link-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 12px;
            border-radius: 12px;
            text-decoration: none;
            color: var(--white);
            font-size: 14px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.3s;
        }

        .link-item:hover { background: var(--gold); color: var(--dark); }

        .btn-main {
            background: var(--white);
            color: var(--dark);
            border: none;
            padding: 15px;
            border-radius: 50px;
            font-weight: 700;
            width: 100%;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 12px;
        }

        /* 🟢 QR-kod oynasi sozlamalari */
        #qr-overlay {
            display: none; /* Boshida yashirin */
            margin-top: 20px;
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: fadeIn 0.3s ease;
        }

        #qrcode img { margin: 0 auto; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="card">
        <div class="avatar">NA</div>
        <h1>Nurillokh Abdulazizov</h1>
        <div class="dept">International Relations Department</div>
        <div class="cab">📍 Cabinet A205</div>

        <div class="links">
            <a href="tel:+998500734916" class="link-item">📞 +998 50 073 49 16</a>
            <a href="mailto:nurullohabdulazizov12@gmail.com" class="link-item">✉️ Email Me</a>
            <a href="https://t.me/N_Abdulazizov" target="_blank" class="link-item">✈️ Telegram</a>
        </div>

        <button class="btn-main" onclick="downloadVCF()">Save Contact</button>
        
        <p id="toggleBtn" onclick="toggleQR()" style="font-size: 11px; cursor: pointer; margin-top: 20px; color: var(--gold); text-decoration: underline;">
            Share QR Code
        </p>

        <div id="qr-overlay">
            <div id="qrcode"></div>
            <p style="color: #333; font-size: 10px; margin-top: 10px;">Scan to open card</p>
        </div>
    </div>

    <script>
        // 1. QR kodni sayt yuklanishi bilan yaratib qo'yamiz
        var qrcode = new QRCode(document.getElementById("qrcode"), {
            text: "https://nurullohabdulazizov12-cmd.github.io/business-card/",
            width: 150,
            height: 150,
            colorDark : "#0f172a",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
        });

        // 2. Oynani ochish/yopish funksiyasi
        function toggleQR() {
            var qrBox = document.getElementById("qr-overlay");
            if (qrBox.style.display === "none" || qrBox.style.display === "") {
                qrBox.style.display = "block";
                qrBox.scrollIntoView({ behavior: 'smooth' });
            } else {
                qrBox.style.display = "none";
            }
        }

        // 3. Kontaktni saqlash funksiyasi
        function downloadVCF() {
            var vCardData = "BEGIN:VCARD\nVERSION:3.0\nFN:Nurillokh Abdulazizov\nORG:KIUT;International Relations\nTEL;TYPE=CELL:+998500734916\nEMAIL:nurullohabdulazizov12@gmail.com\nEND:VCARD";
            var blob = new Blob([vCardData], { type: "text/vcard" });
            var url = window.URL.createObjectURL(blob);
            var link = document.createElement('a');
            link.href = url;
            link.download = 'Nurillokh.vcf';
            link.click();
        }
    </script>
</body>
</html>
