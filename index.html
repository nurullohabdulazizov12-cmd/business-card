<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nurillokh Abdulazizov | KIUT Executive</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.7.0/vanilla-tilt.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Outfit:wght@300;400;600&display=swap');

        :root {
            --accent: #c5a059;
            --bg: #050810;
            --card: rgba(15, 23, 42, 0.6);
            --border: rgba(197, 160, 89, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(197, 160, 89, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(0, 243, 255, 0.05) 0%, transparent 40%);
            font-family: 'Outfit', sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .bento-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 380px;
            padding: 20px;
            z-index: 2;
        }

        .tile {
            background: var(--card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 20px;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .tile:hover {
            border-color: var(--accent);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(197, 160, 89, 0.1);
        }

        /* 1. Profil bloki (Katta) */
        .profile-tile {
            grid-column: span 2;
            text-align: center;
        }

        .img-box {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 0 auto 15px;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid var(--accent);
            object-fit: cover;
        }

        .online-badge {
            position: absolute;
            bottom: 5px;
            right: 5px;
            width: 15px;
            height: 15px;
            background: #22c55e;
            border: 3px solid #0f172a;
            border-radius: 50%;
            box-shadow: 0 0 10px #22c55e;
        }

        .typewriter h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 20px;
            color: var(--accent);
            white-space: nowrap;
            overflow: hidden;
            border-right: 3px solid var(--accent);
            width: 0;
            margin: 0 auto;
            animation: typing 3s steps(22) forwards, blink 0.8s step-end infinite;
        }

        /* 2. Status bloki */
        .status-tile {
            grid-column: span 2;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            padding: 12px 20px;
        }

        /* 3. Kontakt tugmalari */
        .action-tile {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: white;
            font-size: 12px;
            gap: 8px;
        }

        .action-tile i { font-size: 20px; color: var(--accent); }

        /* 4. Save VCF tugmasi (Katta) */
        .save-btn {
            grid-column: span 2;
            background: var(--accent);
            color: var(--bg);
            border: none;
            border-radius: 18px;
            padding: 15px;
            font-weight: 700;
            font-family: 'Space Grotesk', sans-serif;
            cursor: pointer;
            transition: 0.3s;
        }

        .save-btn:hover {
            filter: brightness(1.2);
            letter-spacing: 1px;
        }

        @keyframes typing { from { width: 0 } to { width: 100% } }
        @keyframes blink { 50% { border-color: transparent } }

        #qr-modal {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 25px;
            border-radius: 30px;
            z-index: 100;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="bento-grid">
        <div class="tile profile-tile" data-tilt>
            <div class="img-box">
                <img src="Nurillokh.jpg" class="profile-img" alt="Nurillokh">
                <div class="online-badge"></div>
            </div>
            <div class="typewriter">
                <h1>Nurillokh Abdulazizov</h1>
            </div>
            <p style="font-size: 11px; opacity: 0.6; margin-top: 5px;">INTERNATIONAL RELATIONS DEPARTMENT</p>
        </div>

        <div class="tile status-tile">
            <span id="local-time">00:00:00</span>
            <span style="color: #22c55e;">● Available Now</span>
        </div>

        <a href="https://t.me/N_Abdulazizov" class="tile action-tile">
            <span>✈️</span>
            <span>Telegram</span>
        </a>

        <a href="mailto:nurullohabdulazizov12@gmail.com" class="tile action-tile">
            <span>✉️</span>
            <span>Email</span>
        </a>

        <div class="tile action-tile" onclick="toggleQR()" style="cursor:pointer;">
            <span>📷</span>
            <span>QR Share</span>
        </div>

        <a href="tel:+998500734916" class="tile action-tile">
            <span>📞</span>
            <span>Call</span>
        </a>

        <button class="save-btn" onclick="downloadVCF()">SAVE TO CONTACTS</button>
        
        <p style="grid-column: span 2; text-align: center; font-size: 10px; opacity: 0.4;">
            Cabinet A205 • Kimyo International University
        </p>
    </div>

    <div id="qr-modal">
        <div id="qrcode"></div>
        <button onclick="toggleQR()" style="margin-top: 15px; border: none; background: none; color: #333; font-weight: bold; cursor:pointer;">CLOSE</button>
    </div>

    <script>
        // 1. Jonli vaqt
        function updateTime() {
            const now = new Date();
            document.getElementById('local-time').innerText = now.toLocaleTimeString();
        }
        setInterval(updateTime, 1000);
        updateTime();

        // 2. VCF Yuklash (Haqiqiy kontakt yaratish)
        function downloadVCF() {
            const vcard = "BEGIN:VCARD\nVERSION:3.0\nFN:Nurillokh Abdulazizov\nORG:KIUT (International Relations)\nTEL:+998500734916\nEMAIL:nurullohabdulazizov12@gmail.com\nEND:VCARD";
            const blob = new Blob([vcard], { type: "text/vcard" });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'Nurillokh_Abdulazizov.vcf';
            a.click();
        }

        // 3. QR Kod
        new QRCode(document.getElementById("qrcode"), {
            text: window.location.href,
            width: 200, height: 200
        });

        function toggleQR() {
            const m = document.getElementById('qr-modal');
            m.style.display = m.style.display === 'block' ? 'none' : 'block';
        }

        // 4. Tilt effekti
        VanillaTilt.init(document.querySelectorAll(".tile"), {
            max: 5,
            speed: 400,
            glare: true,
            "max-glare": 0.1
        });
    </script>
</body>
</html>
