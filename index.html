<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nurillokh | Future Card Elite</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/particles.js/2.0.0/particles.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.7.0/vanilla-tilt.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap');

        :root {
            --gold: #c5a059;
            --dark: #020617;
            --glass: rgba(255, 255, 255, 0.03);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: var(--dark);
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
        }

        /* 🌌 Orqa fon zarrachalari */
        #particles-js {
            position: absolute; width: 100%; height: 100%;
            z-index: 1;
        }

        .container {
            position: relative; z-index: 2;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; perspective: 1000px;
        }

        /* ✨ 3D Neon Karta */
        .card {
            width: 320px;
            padding: 40px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            text-align: center;
            color: white;
            position: relative;
            overflow: hidden;
            transform-style: preserve-3d;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        /* 💫 Aylanuvchi Neon Hoshiya */
        .card::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: conic-gradient(transparent, transparent, transparent, var(--gold));
            animation: rotateNeon 4s linear infinite;
            z-index: -2;
        }

        .card::after {
            content: '';
            position: absolute;
            inset: 3px;
            background: #0f172a;
            border-radius: 22px;
            z-index: -1;
        }

        @keyframes rotateNeon {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .profile-img {
            width: 110px; height: 110px;
            border-radius: 50%;
            border: 3px solid var(--gold);
            margin-bottom: 20px;
            box-shadow: 0 0 25px var(--gold);
            object-fit: cover;
        }

        /* ⌨️ Typewriter Animatsiyasi */
        .typewriter {
            margin-bottom: 5px;
        }

        .typewriter h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 18px;
            color: var(--gold);
            white-space: nowrap;
            overflow: hidden;
            border-right: 3px solid var(--gold);
            margin: 0 auto;
            width: 0;
            animation: 
                typing 3s steps(22, end) forwards,
                blink 0.8s step-end infinite;
        }

        @keyframes typing {
            from { width: 0; }
            to { width: 100%; }
        }

        @keyframes blink {
            50% { border-color: transparent; }
        }

        .dept {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.7;
            margin-bottom: 30px;
        }

        .links {
            display: flex; flex-direction: column; gap: 12px;
        }

        .link-item {
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(197, 160, 89, 0.2);
            border-radius: 12px;
            text-decoration: none;
            color: white;
            font-size: 13px;
            font-weight: 600;
            transition: 0.3s ease;
        }

        .link-item:hover {
            background: var(--gold);
            color: var(--dark);
            transform: translateZ(30px);
            box-shadow: 0 0 20px var(--gold);
        }

        .qr-btn {
            margin-top: 30px;
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            font-size: 10px;
            transition: 0.3s;
        }

        .qr-btn:hover {
            background: var(--gold);
            color: var(--dark);
        }

        #qr-modal {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 25px;
            border-radius: 20px;
            z-index: 1000;
            text-align: center;
        }

        #qr-modal.active { display: block; }

        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 999;
        }

        .overlay.active { display: block; }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <div class="container">
        <div class="card" data-tilt data-tilt-max="15" data-tilt-glare data-tilt-max-glare="0.2">
            <img src="Nurillokh.jpg" class="profile-img" alt="Nurillokh">
            
            <div class="typewriter">
                <h1>Nurillokh Abdulazizov</h1>
            </div>
            
            <div class="dept">International Relations Department</div>
            
            <div class="links">
                <a href="tel:+998500734916" class="link-item">📞 CALL MOBILE</a>
                <a href="https://t.me/N_Abdulazizov" target="_blank" class="link-item">✈️ TELEGRAM</a>
                <a href="mailto:nurullohabdulazizov12@gmail.com" class="link-item">✉️ SEND EMAIL</a>
            </div>

            <button class="qr-btn" onclick="toggleQR()">SHARE CONTACT</button>
        </div>
    </div>

    <div class="overlay" id="overlay" onclick="toggleQR()"></div>
    <div id="qr-modal">
        <div id="qrcode"></div>
        <p style="color: black; font-size: 10px; margin-top: 15px;">Scan to open my card</p>
    </div>

    <script>
        // 1. Particles Config
        particlesJS('particles-js', {
            particles: {
                number: { value: 80 },
                color: { value: '#c5a059' },
                shape: { type: 'circle' },
                opacity: { value: 0.4 },
                size: { value: 3 },
                line_linked: { enable: true, distance: 150, color: '#c5a059', opacity: 0.2, width: 1 },
                move: { enable: true, speed: 1.5 }
            },
            interactivity: {
                events: { onhover: { enable: true, mode: 'repulse' } }
            }
        });

        // 2. QR Code
        new QRCode(document.getElementById("qrcode"), {
            text: window.location.href,
            width: 180,
            height: 180
        });

        function toggleQR() {
            document.getElementById('qr-modal').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }
    </script>
</body>
</html>
