<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nurillokh Abdulazizov | Executive Hub</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.7.0/vanilla-tilt.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Plus+Jakarta+Sans:wght@500;800&display=swap');

        :root {
            --accent: #c5a059;
            --bg: #030712;
            --card: rgba(17, 24, 39, 0.7);
            --border: rgba(197, 160, 89, 0.25);
            --blue: #3b82f6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at 0% 0%, rgba(197, 160, 89, 0.1) 0%, transparent 40%);
            font-family: 'Outfit', sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .bento-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            width: 370px;
            padding: 20px;
            z-index: 5;
        }

        .tile {
            background: var(--card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 20px;
            transition: all 0.3s ease;
        }

        /* Profile & Status */
        .profile-tile { grid-column: span 2; text-align: center; }
        .img-container { position: relative; width: 100px; height: 100px; margin: 0 auto; }
        .profile-img { width: 100%; height: 100%; border-radius: 50%; border: 2px solid var(--accent); object-fit: cover; }
        .status-badge { position: absolute; bottom: 5px; right: 5px; width: 16px; height: 16px; border-radius: 50%; border: 3px solid #030712; }

        .name-reveal {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 20px; font-weight: 800; color: var(--accent);
            margin-top: 10px;
        }

        .status-tile { grid-column: span 2; display: flex; justify-content: space-between; align-items: center; font-size: 13px; }

        /* Links */
        .link-tile { display: flex; flex-direction: column; align-items: center; text-decoration: none; color: white; font-size: 12px; gap: 8px; }
        .icon-circle { width: 40px; height: 40px; background: rgba(255, 255, 255, 0.05); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); }

        .save-btn { grid-column: span 2; background: var(--accent); color: #000; border: none; border-radius: 20px; padding: 16px; font-weight: 700; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }

        /* --- Admin Panel Styles --- */
        #admin-panel {
            display: none;
            position: fixed;
            bottom: 20px;
            background: #1e293b;
            padding: 15px;
            border-radius: 20px;
            border: 2px solid var(--accent);
            z-index: 1000;
            width: 300px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        .admin-btn {
            width: 100%;
            padding: 8px;
            margin: 5px 0;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        #qr-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; justify-content: center; align-items: center; flex-direction: column; }
        #qrcode { background: white; padding: 20px; border-radius: 20px; }
    </style>
</head>
<body>

    <div class="bento-grid">
        <div class="tile profile-tile">
            <div class="img-container">
                <img src="Nurillokh.jpg" class="profile-img" alt="Nurillokh">
                <div id="badge" class="status-badge"></div>
            </div>
            <div class="name-reveal">Nurillokh Abdulazizov</div>
            <p style="font-size: 10px; opacity: 0.5; margin-top: 5px; letter-spacing: 1.5px;">INTERNATIONAL RELATIONS</p>
        </div>

        <div class="tile status-tile">
            <span id="time-display">00:00</span>
            <span id="status-text">Checking...</span>
        </div>

        <a href="https://t.me/N_Abdulazizov" target="_blank" class="tile link-tile">
            <div class="icon-circle">✈️</div><span>Telegram</span>
        </a>
        <a href="mailto:nurullohabdulazizov12@gmail.com" class="tile link-tile">
            <div class="icon-circle">✉️</div><span>Email</span>
        </a>
        <div class="tile link-tile" onclick="openQR()" style="cursor:pointer;">
            <div class="icon-circle">📷</div><span>QR Share</span>
        </div>
        <a href="tel:+998500734916" class="tile link-tile">
            <div class="icon-circle">📞</div><span>Call</span>
        </a>

        <button class="save-btn" onclick="saveToContacts()">Save to Contacts</button>
        
        <p onclick="adminClick()" style="grid-column: span 2; text-align: center; font-size: 9px; opacity: 0.3; cursor: pointer;">
            KIUT • CABINET A205 • TASHKENT
        </p>
    </div>

    <div id="admin-panel">
        <p style="font-size: 12px; margin-bottom: 10px; text-align: center;">ADMIN STATUS CONTROL</p>
        <button class="admin-btn" style="background: #10b981;" onclick="setStatus('auto')">Auto (10:00-18:00)</button>
        <button class="admin-btn" style="background: #3b82f6; color: white;" onclick="setStatus('trip')">✈️ Business Trip</button>
        <button class="admin-btn" style="background: #f43f5e; color: white;" onclick="setStatus('meeting')">🤝 In a Meeting</button>
        <button class="admin-btn" style="background: #64748b; color: white;" onclick="closeAdmin()">Close</button>
    </div>

    <div id="qr-overlay" onclick="closeQR()">
        <div id="qrcode"></div>
    </div>

    <script>
        let clickCount = 0;
        function adminClick() {
            clickCount++;
            if (clickCount === 3) {
                document.getElementById('admin-panel').style.display = 'block';
                clickCount = 0;
            }
            setTimeout(() => clickCount = 0, 2000);
        }

        function setStatus(mode) {
            localStorage.setItem('nurillokh_status', mode);
            refreshStatus();
            closeAdmin();
        }

        function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }

        function refreshStatus() {
            const now = new Date();
            document.getElementById('time-display').innerText = now.toLocaleTimeString('uz-UZ', {hour: '2-digit', minute: '2-digit'});
            
            const text = document.getElementById('status-text');
            const badge = document.getElementById('badge');
            const mode = localStorage.getItem('nurillokh_status') || 'auto';

            if (mode === 'trip') {
                text.innerText = "✈️ On Business Trip";
                text.style.color = "#3b82f6";
                badge.style.background = "#3b82f6";
            } else if (mode === 'meeting') {
                text.innerText = "🤝 In a Meeting";
                text.style.color = "#f43f5e";
                badge.style.background = "#f43f5e";
            } else {
                const h = now.getHours();
                const day = now.getDay();
                const isWork = day >= 1 && day <= 5 && h >= 10 && h < 18;
                text.innerText = isWork ? "● In Office" : "● Out of Office";
                text.style.color = isWork ? "#10b981" : "#f43f5e";
                badge.style.background = isWork ? "#10b981" : "#f43f5e";
            }
        }

        setInterval(refreshStatus, 1000);
        refreshStatus();

        function saveToContacts() {
            const vcf = "BEGIN:VCARD\nVERSION:3.0\nFN:Nurillokh Abdulazizov\nORG:KIUT\nTEL:+998500734916\nEMAIL:nurullohabdulazizov12@gmail.com\nEND:VCARD";
            const blob = new Blob([vcf], { type: "text/vcard" });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'Nurillokh_KIUT.vcf'; a.click();
        }

        new QRCode(document.getElementById("qrcode"), { text: window.location.href, width: 200, height: 200 });
        function openQR() { document.getElementById('qr-overlay').style.display = 'flex'; }
        function closeQR() { document.getElementById('qr-overlay').style.display = 'none'; }
        VanillaTilt.init(document.querySelectorAll(".tile"), { max: 5, speed: 400 });
    </script>
</body>
</html>
</html>
