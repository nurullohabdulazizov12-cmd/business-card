<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nurillokh | Future Card</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/particles.js/2.0.0/particles.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.7.0/vanilla-tilt.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #020617;
        }

        /* 🌌 Zarrachalar foni */
        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            perspective: 1000px;
        }

        /* ✨ Shishali Karta (Glassmorphism) */
        .card {
            width: 320px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            text-align: center;
            color: white;
            box-shadow: 0 25px 45px rgba(0,0,0,0.5);
            transform-style: preserve-3d;
        }

        .profile-img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 3px solid #c5a059;
            margin-bottom: 15px;
            box-shadow: 0 0 20px #c5a059;
            object-fit: cover;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 18px;
            letter-spacing: 2px;
            margin: 10px 0;
            color: #c5a059;
        }

        .dept {
            font-family: 'Poppins', sans-serif;
            font-size: 10px;
            text-transform: uppercase;
            opacity: 0.8;
            margin-bottom: 25px;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-item {
            padding: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            text-decoration: none;
            color: white;
            font-size: 13px;
            transition: 0.3s;
            border: 1px solid transparent;
        }

        .link-item:hover {
            background: rgba(197, 160, 89, 0.2);
            border-color: #c5a059;
            transform: translateZ(20px);
        }

        .qr-btn {
            margin-top: 25px;
            background: #c5a059;
            color: #020617;
            border: none;
            padding: 12px 25px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            font-size: 10px;
        }

        #qr-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 20px;
            border-radius: 20px;
            z-index: 100;
        }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <div class="container">
        <div class="card" data-tilt data-tilt-max="15" data-tilt-speed="400" data-tilt-glare data-tilt-max-glare="0.3">
            <img src="Nurillokh.jpg" class="profile-img" alt="Nurillokh">
            <h1>Nurillokh Abdulazizov</h1>
            <div class="dept">International Relations Department</div>
            
            <div class="links">
                <a href="tel:+998500734916" class="link-item">📞 CALL ME</a>
                <a href="https://t.me/N_Abdulazizov" class="link-item">✈️ TELEGRAM</a>
                <a href="mailto:nurullohabdulazizov12@gmail.com" class="link-item">✉️ EMAIL</a>
            </div>

            <button class="qr-btn" onclick="toggleQR()">GENERATE QR SCAN</button>
        </div>
    </div>

    <div id="qr-modal" onclick="this.style.display='none'">
        <div id="qrcode"></div>
    </div>

    <script>
        // 1. Zarrachalar (Particles) sozlamalari
        particlesJS('particles-js', {
            particles: {
                number: { value: 80 },
                color: { value: '#c5a059' },
                shape: { type: 'circle' },
                opacity: { value: 0.5 },
                size: { value: 3 },
                line_linked: { enable: true, distance: 150, color: '#c5a059', opacity: 0.4, width: 1 },
                move: { enable: true, speed: 2 }
            },
            interactivity: {
                detect_on: 'canvas',
                events: { onhover: { enable: true, mode: 'repulse' }, onclick: { enable: true, mode: 'push' } }
            }
        });

        // 2. QR Kod
        new QRCode(document.getElementById("qrcode"), {
            text: window.location.href,
            width: 200,
            height: 200
        });

        function toggleQR() {
            const modal = document.getElementById('qr-modal');
            modal.style.display = modal.style.display === 'block' ? 'none' : 'block';
        }
    </script>
</body>
</html>
</html>
