<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nurillokh Abdulazizov | KIUT Executive</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.7.0/vanilla-tilt.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Plus+Jakarta+Sans:wght@500;800&display=swap');

        :root {
            --accent: #c5a059;
            --bg: #030712;
            --card: rgba(17, 24, 39, 0.7);
            --border: rgba(197, 160, 89, 0.25);
            --green: #10b981;
            --red: #f43f5e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(197, 160, 89, 0.12) 0%, transparent 35%),
                radial-gradient(circle at 100% 100%, rgba(0, 243, 255, 0.05) 0%, transparent 35%);
            font-family: 'Outfit', sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .bento-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            width: 370px;
            padding: 20px;
            z-index: 5;
        }

        .tile {
            background: var(--card);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 20px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .tile:hover {
            border-color: var(--accent);
            background: rgba(17, 24, 39, 0.9);
            box-shadow: 0 0 25px rgba(197, 160, 89, 0.15);
        }

        /* --- 🌟 Ism effekti (Typewriter o'rniga) --- */
        .name-reveal {
            opacity: 0;
            transform: translateY(10px);
            animation: revealEffect 1.2s ease-out forwards;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 20px;
            font-weight: 800;
            color: var(--accent);
            letter-spacing: -0.5px;
            text-shadow: 0 0 20px rgba(197, 160, 89, 0.3);
            margin-top: 10px;
        }

        @keyframes revealEffect {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* --- 📸 Profil qismi --- */
        .profile-tile { grid-column: span 2; text-align: center; }
        
        .img-container {
            position: relative;
            width: 105px;
            height: 105px;
            margin: 0 auto;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid var(--accent);
            object-fit: cover;
            padding: 3px;
        }

        .status-badge {
            position: absolute;
            bottom: 5px;
            right: 5px;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 3px solid #030712;
            transition: 0.5s;
        }

        /* --- 🕒 Status Tile --- */
        .status-tile {
            grid-column: span 2;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            font-weight: 500;
            padding: 15px 20px;
        }

        #status-text { text-transform: uppercase; letter-spacing: 1px; font-size: 11px; }

        /* --- 📱 Linklar --- */
        .link-tile {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: white;
            font-size: 12px;
            font-weight: 600;
            gap: 8px;
        }
        .icon-circle {
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            border: 1px solid var(--border);
        }

        /* --- 📥 Save Contact --- */
        .save-btn {
            grid-column: span 2;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 20px;
            padding: 16px;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Plus Jakarta Sans', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* --- 🏁 QR Modal --- */
        #qr-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            z-index: 100;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        #qrcode { background: white; padding: 20px; border-radius: 20px; }
    </style>
</head>
<body>

    <div class="bento-grid">
        <div class="tile profile-tile" data-tilt data-tilt-max="5">
            <div class="img-container">
                <img src="Nurillokh.jpg" class="profile-img" alt="Nurillokh">
                <div id="badge" class="status-badge"></div>
            </div>
            <div class="name-reveal">Nurillokh Abdulazizov</div>
            <p style="font-size: 10px; opacity: 0.5; margin-top: 6px; letter-spacing: 1.5px;">INTERNATIONAL RELATIONS</p>
        </div>

        <div class="tile status-tile">
            <span id="time-display">00:00</span>
            <span id="status-text">SYSTEM LOADING</span>
        </div>

        <a href="https://t.me/N_Abdulazizov" target="_blank" class="tile link-tile">
            <div class="icon-circle">✈️</div>
            <span>Telegram</span>
        </a>

        <a href="mailto:nurullohabdulazizov12@gmail.com" class="tile link-tile">
            <div class="icon-circle">✉️</div>
            <span>Email</span>
        </a>

        <div class="tile link-tile" onclick="openQR()" style="cursor:pointer;">
            <div class="icon-circle">📷</div>
            <span>QR Share</span>
        </div>

        <a href="tel:+998500734916" class="tile link-tile">
            <div class="icon-circle">📞</div>
            <span>Call</span>
        </a>

        <button class="save-btn" onclick="saveToContacts()">Save to Contacts</button>
        
        <p style="grid-column: span 2; text-align: center; font-size: 9px; opacity: 0.3;">
            KIUT • CABINET A205 • TASHKENT
        </p>
    </div>

    <div id="qr-overlay" onclick="closeQR()">
        <div id="qrcode"></div>
        <p style="margin-top: 20px; font-size: 12px; color: var(--accent);">Tap anywhere to close</p>
    </div>

    <script>
        // 1. SMART STATUS & CLOCK
        function refreshStatus() {
            const now = new Date();
            const h = now.getHours();
            const day = now.getDay(); // 1=Mon, 5=Fri
            
            document.getElementById('time-display').innerText = now.toLocaleTimeString('uz-UZ', {hour: '2-digit', minute: '2-digit'});

            const isWeekday = day >= 1 && day <= 5;
            const isWorkHours = h >= 10 && h < 18;

            const text = document.getElementById('status-text');
            const badge = document.getElementById('badge');

            if (isWeekday && isWorkHours) {
                text.innerText = "● Currently in Office";
                text.style.color = "#10b981";
                badge.style.background = "#10b981";
                badge.style.boxShadow = "0 0 15px #10b981";
            } else {
                text.innerText = "● Out of Office";
                text.style.color = "#f43f5e";
                badge.style.background = "#f43f5e";
                badge.style.boxShadow = "none";
            }
        }
        setInterval(refreshStatus, 1000);
        refreshStatus();

        // 2. CONTACT SAVE
        function saveToContacts() {
            const vcf = "BEGIN:VCARD\nVERSION:3.0\nFN:Nurillokh Abdulazizov\nORG:KIUT (IR Dept)\nTEL:+998500734916\nEMAIL:nurullohabdulazizov12@gmail.com\nEND:VCARD";
            const blob = new Blob([vcf], { type: "text/vcard" });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'Nurillokh_KIUT.vcf';
            a.click();
        }

        // 3. QR LOGIC
        new QRCode(document.getElementById("qrcode"), {
            text: window.location.href,
            width: 220, height: 220,
            colorDark : "#030712",
            colorLight : "#ffffff"
        });

        function openQR() { document.getElementById('qr-overlay').style.display = 'flex'; }
        function closeQR() { document.getElementById('qr-overlay').style.display = 'none'; }

        // 4. TILT
        VanillaTilt.init(document.querySelectorAll(".tile"), {
            max: 8, speed: 400, glare: true, "max-glare": 0.15,
        });
    </script>
</body>
</html>
