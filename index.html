<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nurillokh Abdulazizov | Digital Card</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Cinzel:wght@600&display=swap');

        :root {
            --dark: #0f172a;
            --card-bg: #1e293b;
            --gold: #c5a059;
            --white: #f8fafc;
        }

        body {
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: var(--white);
        }

        .card {
            width: 350px;
            background: var(--card-bg);
            border-radius: 30px;
            padding: 40px 25px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            border: 1px solid rgba(197, 160, 89, 0.2);
            position: relative;
        }

        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            display: block;
            margin: 0 auto 15px;
            border: 3px solid var(--gold);
            box-shadow: 0 0 20px rgba(197, 160, 89, 0.4);
        }

        h1 { margin: 10px 0 5px; font-size: 20px; }
        .dept { color: var(--gold); font-size: 12px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        .cab { font-size: 11px; opacity: 0.7; margin-bottom: 20px; }

        /* Statistika dizayni */
        .stats-container {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }
        .stat-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 20px;
            border-radius: 12px;
            border: 1px solid rgba(197, 160, 89, 0.1);
        }
        .stat-box span { font-size: 16px; font-weight: bold; color: var(--gold); display: block; }
        .stat-box p { font-size: 8px; margin: 0; text-transform: uppercase; opacity: 0.6; }

        .links { display: flex; flex-direction: column; gap: 10px; margin-bottom: 25px; }
        
        .link-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 12px;
            border-radius: 12px;
            text-decoration: none;
            color: var(--white);
            font-size: 14px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.3s;
        }

        .link-item:hover { background: var(--gold); color: var(--dark); }

        .btn-main {
            background: var(--white);
            color: var(--dark);
            border: none;
            padding: 15px;
            border-radius: 50px;
            font-weight: 700;
            width: 100%;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 12px;
        }

        #qr-overlay {
            display: none;
            margin-top: 20px;
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #qrcode img { margin: 0 auto; }
    </style>
</head>
<body>

    <div class="card">
        <img src="Nurillokh.jpg" class="profile-img" alt="Nurillokh">
        
        <h1>Nurillokh Abdulazizov</h1>
        <div class="dept">International Relations Department</div>
        <div class="cab">📍 Cabinet A205</div>

        <div class="stats-container">
            <div class="stat-box">
                <span id="visit-count">0</span>
                <p>Profile Views</p>
            </div>
        </div>

        <div class="links">
            <a href="tel:+998500734916" class="link-item">📞 +998 50 073 49 16</a>
            <a href="mailto:nurullohabdulazizov12@gmail.com" class="link-item">✉️ Email Me</a>
            <a href="https://t.me/N_Abdulazizov" target="_blank" class="link-item">✈️ Telegram</a>
        </div>

        <button class="btn-main" onclick="downloadVCF()">Save Contact</button>
        
        <p onclick="toggleQR()" style="font-size: 11px; cursor: pointer; margin-top: 20px; color: var(--gold); text-decoration: underline;">
            Share QR Code
        </p>

        <div id="qr-overlay">
            <div id="qrcode"></div>
            <p style="color: #333; font-size: 10px; margin-top: 10px;">Scan to open card</p>
        </div>
    </div>

    <script>
        // 1. QR kod yaratish
        new QRCode(document.getElementById("qrcode"), {
            text: "https://nurullohabdulazizov12-cmd.github.io/business-card/",
            width: 150,
            height: 150,
            colorDark : "#0f172a",
            colorLight : "#ffffff"
        });

        // 2. Statistika funksiyasi (LocalStorage - sizning brauzeringizda saqlaydi)
        // Haqiqiy global statistika uchun CountAPI ba'zan sekin, shuning uchun sodda usul:
        let views = localStorage.getItem('onchain_views') || 0;
        views++;
        localStorage.setItem('onchain_views', views);
        document.getElementById('visit-count').innerText = views;

        function toggleQR() {
            var qrBox = document.getElementById("qr-overlay");
            qrBox.style.display = (qrBox.style.display === "block") ? "none" : "block";
            if(qrBox.style.display === "block") qrBox.scrollIntoView({ behavior: 'smooth' });
        }

        function downloadVCF() {
            var vCardData = "BEGIN:VCARD\nVERSION:3.0\nFN:Nurillokh Abdulazizov\nORG:KIUT;International Relations\nTEL;TYPE=CELL:+998500734916\nEMAIL:nurullohabdulazizov12@gmail.com\nEND:VCARD";
            var blob = new Blob([vCardData], { type: "text/vcard" });
            var url = window.URL.createObjectURL(blob);
            var link = document.createElement('a');
            link.href = url;
            link.download = 'Nurillokh.vcf';
            link.click();
        }
    </script>
</body>
</html>
